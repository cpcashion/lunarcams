<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#2e3446"/>

  <!-- Clipping path: inner filled circle -->
  <defs>
    <clipPath id="inner-circle">
      <circle cx="240" cy="256" r="178"/>
    </clipPath>
    <clipPath id="full-circle">
      <circle cx="256" cy="256" r="194"/>
    </clipPath>
  </defs>

  <!-- Outer ring (full moon circle border) -->
  <circle cx="256" cy="256" r="194" fill="none" stroke="#e8eaf0" stroke-width="14"/>

  <!-- Crescent shadow arc (right side) -->
  <circle cx="320" cy="256" r="174" fill="#2e3446"/>

  <!-- Horizontal scan lines inside the inner circle -->
  <g clip-path="url(#inner-circle)">
    <!-- Lines spaced 20px apart, covering full circle height -->
    <line x1="40" y1="90"  x2="450" y2="90"  stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="112" x2="450" y2="112" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="134" x2="450" y2="134" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="156" x2="450" y2="156" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="178" x2="450" y2="178" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="200" x2="450" y2="200" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="222" x2="450" y2="222" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="244" x2="450" y2="244" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="266" x2="450" y2="266" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="288" x2="450" y2="288" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="310" x2="450" y2="310" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="332" x2="450" y2="332" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="354" x2="450" y2="354" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="376" x2="450" y2="376" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="398" x2="450" y2="398" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
    <line x1="40" y1="420" x2="450" y2="420" stroke="#e8eaf0" stroke-width="11" stroke-linecap="round"/>
  </g>

  <!-- Inner circle border -->
  <circle cx="240" cy="256" r="178" fill="none" stroke="#e8eaf0" stroke-width="10"/>

  <!-- Crescent outer arc re-draw on top to restore the outer ring over the shadow -->
  <path d="M256,62 A194,194 0 1,1 256,450" fill="none" stroke="#e8eaf0" stroke-width="14"/>
</svg>
